<script>
  // ==========================================
  // КОНСТАНТЫ (единственный блок)
  // ==========================================
  var MAX_TOTAL_ROLES = 6;
  var MAX_PER_ROLE = 3;
  var MAX_FLX = 3;
  var MAX_ENEMIES = 6;
  var MAX_MY = 5;
  var STORAGE_KEY = 'quickPickState_v5';
  var SEARCH_DEBOUNCE_MS = 200;
  var MAX_STARS = 2;  // Максимум звёзд
  var starredEnemies = new Set();  // Враги, требующие особого внимания
  
  // ==========================================
  // СОСТОЯНИЕ
  // ==========================================
  var heroesData = [];
  var selectedEnemies = new Set();
  var selectedMyHeroes = new Set();
  var bannedHeroes = new Set();
  var roleCounts = { sup: 0, dps: 0, tnk: 0, flx: 0 };
  var currentRoleFilter = 'all';
  var currentSearch = '';
  var lastResult = null;
  var maxResultsCount = 10; 
  var currentOptions = null; 
  var evaluationCounter = 0; 
  
  // Кэш DOM
  var DOM = {};
  
  function initDOM() {
    DOM.grid = document.getElementById('heroesGrid');
    DOM.search = document.getElementById('heroSearch');
    DOM.spinner = document.getElementById('spinner');
    DOM.results = document.getElementById('results');
    DOM.resultsList = document.getElementById('resultsList');
    DOM.generateBtn = document.getElementById('generateBtn');
    DOM.compEl = document.getElementById('currentComposition');
    DOM.enemyCount = document.getElementById('enemyCount');
    DOM.myCount = document.getElementById('myCount');
    DOM.banCount = document.getElementById('banCount');
    DOM.roleSup = document.getElementById('roleSup');
    DOM.roleDps = document.getElementById('roleDps');
    DOM.roleTnk = document.getElementById('roleTnk');
    DOM.roleFlx = document.getElementById('roleFlx');
    DOM.totalRoles = document.getElementById('totalRoles');
    DOM.currentMyHeroes = document.getElementById('currentMyHeroes');
    DOM.currentEnemies = document.getElementById('currentEnemies');
    DOM.currentRoles = document.getElementById('currentRoles');
    DOM.starCount = document.getElementById('starCount');
    DOM.currentStars = document.getElementById('currentStars');
    DOM.currentBans = document.getElementById('currentBans');  // 🆕
    DOM.optionsSection = document.getElementById('optionsSection');  // 🆕
    DOM.optionsToggle = document.getElementById('optionsToggle');  // 🆕
    DOM.maxResultsInput = document.getElementById('maxResultsInput');
  }
  
  function debounce(fn, delay) {
    var timer;
    return function() {
      var ctx = this, args = arguments;
      clearTimeout(timer);
      timer = setTimeout(function() { fn.apply(ctx, args); }, delay);
    };
  }
  
  function escapeHtml(text) {
    if (!text) return '';
    return text.toString()
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
  
  function getRoleIcon(role) {
    if (role === 'sup') return '✚';
    if (role === 'dps') return '⚔️';
    if (role === 'tnk') return '🛡️';
    return '';
  }

  // Получение текущих опций из DOM
  function getCurrentOptions() {
    return {
      useSynergies: document.getElementById('useSynergies').checked,
      useSoloSynergies: document.getElementById('useSoloSynergies').checked,
      useTiers: document.getElementById('useTiers').checked,
      useCounterPicks: document.getElementById('useCounterPicks').checked,
      useClassWeights: document.getElementById('useClassWeights').checked,
      useAntiRoleWeights: document.getElementById('useAntiRoleWeights').checked
    };
  }

  // Вычисление текущей раскладки "моих" героев
  function getCurrentComposition(myHeroes) {
    var counts = { sup: 0, dps: 0, tnk: 0 };
    if (!myHeroes || myHeroes.length === 0) return '0-0-0';
    
    myHeroes.forEach(function(name) {
      var hero = heroesData.find(function(h) { return h.name === name; });
      if (hero && hero.role && counts.hasOwnProperty(hero.role)) {
        counts[hero.role]++;
      }
    });
    
    return counts.sup + '-' + counts.dps + '-' + counts.tnk;
  }
  
  // ==========================================
  // ИНИЦИАЛИЗАЦИЯ
  // ==========================================
  (function() {
    initDOM();
    
    // Обработчик поиска
    if (DOM.search) {
      DOM.search.addEventListener('input', debounce(function() {
        currentSearch = this.value;
        renderGrid();
      }, SEARCH_DEBOUNCE_MS));
    }
    
    // Обработчики чекбоксов опций
    ['useSynergies','useSoloSynergies','useTiers','useCounterPicks','useClassWeights','useAntiRoleWeights'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.addEventListener('change', saveState);
    });
    
    // Восстановление состояния сворачивания секции "Учитывать"
    try {
      var isCollapsed = localStorage.getItem('quickPickOptionsCollapsed') === '1';
      if (isCollapsed && DOM.optionsSection && DOM.optionsToggle) {
        DOM.optionsSection.classList.add('collapsed');
        DOM.optionsToggle.textContent = '▶';
      } else if (DOM.optionsSection && DOM.optionsToggle) {
        // По умолчанию — свёрнута
        DOM.optionsSection.classList.add('collapsed');
        DOM.optionsToggle.textContent = '▶';
      }
    } catch (e) {
      // Если localStorage недоступен — просто сворачиваем по умолчанию
      if (DOM.optionsSection && DOM.optionsToggle) {
        DOM.optionsSection.classList.add('collapsed');
        DOM.optionsToggle.textContent = '▶';
      }
    }
    
    // Восстановление количества отображаемых команд (без лимита)
    try {
      var savedMaxResults = localStorage.getItem('quickPickMaxResults');
      if (savedMaxResults && DOM.maxResultsInput) {
        var val = parseInt(savedMaxResults);
        if (!isNaN(val) && val >= 1) {
          DOM.maxResultsInput.value = val;
          maxResultsCount = val;
        }
      }
    } catch (e) {}
    
    // Загрузка данных героев
    loadHeroesData();
  })();
  
  function loadHeroesData() {
    // Показываем индикатор загрузки
    if (DOM.grid) {
      DOM.grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;">' +
        '<div style="display:inline-block;width:30px;height:30px;border:3px solid #f3f3f3;' +
        'border-top:3px solid #4CAF50;border-radius:50%;animation:spin 1s linear infinite;"></div>' +
        '<p style="margin-top:10px;color:#666;">Загрузка героев...</p>' +
        '<style>@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style>' +
        '</div>';
    }
    
    google.script.run
      .withSuccessHandler(function(data) {
        heroesData = data.heroes || [];
        if (heroesData.length === 0) {
          document.body.innerHTML = '<div style="padding:20px;color:#d32f2f;">❌ Лист матрицы не найден.</div>';
          return;
        }
        renderGrid();
        var saved = loadState();
        if (saved) restoreState(saved);
      })
      .withFailureHandler(function(err) {
        var isAuth = err && err.message && (err.message.indexOf('авторизаци') !== -1 || err.message.indexOf('authorization') !== -1);
        if (isAuth) showAuthError();
        else document.body.innerHTML = '<div style="padding:20px;color:#d32f2f;">❌ ' + (err.message || 'Ошибка') + '</div>';
      })
      .getHeroesData();
  }
  
  // ==========================================
  // РЕНДЕР
  // ==========================================
  function renderGrid() {
    if (!DOM.grid) return;
    var search = currentSearch.toLowerCase();
    var filtered = heroesData.filter(function(h) {
      if (search && h.name.toLowerCase().indexOf(search) === -1) return false;
      if (currentRoleFilter !== 'all' && h.role !== currentRoleFilter) return false;
      return true;
    });
    var roleOrder = { sup: 0, dps: 1, tnk: 2 };
    filtered.sort(function(a, b) {
      var ra = roleOrder[a.role] !== undefined ? roleOrder[a.role] : 3;
      var rb = roleOrder[b.role] !== undefined ? roleOrder[b.role] : 3;
      if (ra !== rb) return ra - rb;
      return a.name.localeCompare(b.name);
    });
    if (filtered.length === 0) {
      DOM.grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#999;padding:20px;">Никого не найдено</div>';
      return;
    }
    DOM.grid.innerHTML = filtered.map(function(h) {
      var escaped = escapeHtml(h.name);
      var roleClass = h.role || 'unknown';
      var roleLabel = h.role === 'sup' ? '✚' : h.role === 'dps' ? '⚔️' : h.role === 'tnk' ? '🛡️' : '—';
      var isEnemy = selectedEnemies.has(h.name);
      var isMy = selectedMyHeroes.has(h.name);
      var isBan = bannedHeroes.has(h.name);
      var isStarred = starredEnemies.has(h.name);
      
      var cardClass = 'hero-card' + 
        (isBan ? ' is-ban' : '') + 
        (isStarred ? ' is-starred' : '') +
        (!isBan && isEnemy && isMy ? ' is-enemy is-my' : '') +
        (!isBan && isEnemy && !isMy ? ' is-enemy' : '') +
        (!isBan && !isEnemy && isMy ? ' is-my' : '');
      
      return '<div class="' + cardClass + '">' +
        '<div class="hero-card-header"><span class="hero-role ' + roleClass + '">' + roleLabel + '</span></div>' +
        '<div class="hero-card-body">' +
          '<div class="hero-name">' + escaped + '</div>' +
          (h.class ? '<div class="hero-class" style="font-size:10px;color:#666;">' + escapeHtml(h.class) + (h.counter ? ' / ' + escapeHtml(h.counter) : '') + '</div>' : '') +
        '</div>' +
        '<div class="status-buttons">' +
          '<button class="status-btn ' + (isEnemy ? 'active-enemy' : '') + '" onclick="toggleStatus(\'' + escaped.replace(/'/g, "\\'") + '\', \'enemy\')" title="Враг">⚔️</button>' +
          '<button class="status-btn ' + (isMy ? 'active-my' : '') + '" onclick="toggleStatus(\'' + escaped.replace(/'/g, "\\'") + '\', \'my\')" title="Мой">👥</button>' +
          '<button class="status-btn ' + (isStarred ? 'active-star' : '') + '" onclick="toggleStar(\'' + escaped.replace(/'/g, "\\'") + '\')" title="Ключевой враг (макс 2)">⭐</button>' +
          '<button class="status-btn ' + (isBan ? 'active-ban' : '') + '" onclick="toggleStatus(\'' + escaped.replace(/'/g, "\\'") + '\', \'ban\')" title="Бан">🚫</button>' +
        '</div></div>';
    }).join('');
  }
  
  // ==========================================
  // СТАТУСЫ
  // ==========================================
  function toggleStatus(heroName, status) {
    if (status === 'ban') {
      if (bannedHeroes.has(heroName)) bannedHeroes.delete(heroName);
      else {
        selectedEnemies.delete(heroName);
        selectedMyHeroes.delete(heroName);
        starredEnemies.delete(heroName);  // Снимаем звезду при бане
        bannedHeroes.add(heroName);
      }
    } else if (status === 'enemy') {
      if (bannedHeroes.has(heroName)) bannedHeroes.delete(heroName);
      if (selectedEnemies.has(heroName)) {
        selectedEnemies.delete(heroName);
        starredEnemies.delete(heroName);  // Снимаем звезду вместе со статусом врага
      } else {
        if (selectedEnemies.size >= MAX_ENEMIES) { alert('Максимум ' + MAX_ENEMIES + ' врагов!'); renderGrid(); updateCounters(); return; }
        selectedEnemies.add(heroName);
      }
    } else if (status === 'my') {
      if (bannedHeroes.has(heroName)) bannedHeroes.delete(heroName);
      if (selectedMyHeroes.has(heroName)) selectedMyHeroes.delete(heroName);
      else {
        if (selectedMyHeroes.size >= MAX_MY) { alert('Максимум ' + MAX_MY + ' своих!'); renderGrid(); updateCounters(); return; }
        selectedMyHeroes.add(heroName);
      }
    }
    if (DOM.search) {
      DOM.search.value = '';
      currentSearch = '';
    }
    renderGrid();
    updateCounters();
    updateCurrentComposition();
    validateForm();
    saveState();
  }

  // ==========================================
  // УПРАВЛЕНИЕ ЗВЁЗДАМИ (ключевые враги)
  // ==========================================
  function toggleStar(heroName) {
    if (starredEnemies.has(heroName)) {
      // Снимаем звезду
      starredEnemies.delete(heroName);
    } else {
      // Добавляем звезду
      if (starredEnemies.size >= MAX_STARS) {
        alert('Максимум ' + MAX_STARS + ' ключевых врагов!\n\nСнимите звезду с другого врага.');
        return;
      }
      // Автоматически делаем врагом, если им не является
      if (!selectedEnemies.has(heroName)) {
        if (selectedEnemies.size >= MAX_ENEMIES) {
          alert('Максимум ' + MAX_ENEMIES + ' врагов!');
          return;
        }
        if (bannedHeroes.has(heroName)) bannedHeroes.delete(heroName);
        selectedEnemies.add(heroName);
      }
      starredEnemies.add(heroName);
    }
    if (DOM.search) {
      DOM.search.value = '';
      currentSearch = '';
    }
    renderGrid();
    updateCounters();
    updateCurrentComposition();
    validateForm();
    saveState();
  }
  
  function clearStars() {
    if (starredEnemies.size === 0) return;
    starredEnemies.clear();
    renderGrid();
    updateCounters();
    updateCurrentComposition();
    validateForm();
    saveState();
  }
  
  function filterByRole(role) {
    currentRoleFilter = role;
    document.querySelectorAll('.role-filter-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('data-role') === role);
    });
    renderGrid();
  }
  
  // ==========================================
  // РОЛИ
  // ==========================================
  function changeRole(role, delta) {
    var newValue = roleCounts[role] + delta;
    var maxForRole = (role === 'flx') ? MAX_FLX : MAX_PER_ROLE;
    if (newValue < 0 || newValue > maxForRole) return;
    var total = roleCounts.sup + roleCounts.dps + roleCounts.tnk + roleCounts.flx;
    if (delta > 0 && total >= MAX_TOTAL_ROLES) { alert('Максимум ' + MAX_TOTAL_ROLES + ' ролей!'); return; }
    roleCounts[role] = newValue;
    updateRoleDisplay();
    updateCurrentComposition();
    validateForm();
    saveState();
  }
  
  // ==========================================
  // ОЧИСТКА
  // ==========================================
  function clearEnemies() {
    if (selectedEnemies.size === 0 && starredEnemies.size === 0) return;
    selectedEnemies.clear();
    starredEnemies.clear();  // Сбрасываем звёзды вместе с врагами
    renderGrid(); updateCounters(); updateCurrentComposition(); validateForm(); saveState();
  }
  function clearMyHeroes() {
    if (selectedMyHeroes.size === 0) return;
    selectedMyHeroes.clear();
    renderGrid(); updateCounters(); updateCurrentComposition(); validateForm(); saveState();
  }
  function clearBans() {
    if (bannedHeroes.size === 0) return;
    bannedHeroes.clear();
    renderGrid(); updateCounters(); updateCurrentComposition(); validateForm(); saveState();
  }
  function clearRoles() {
    if (roleCounts.sup === 0 && roleCounts.dps === 0 && roleCounts.tnk === 0 && roleCounts.flx === 0) return;
    roleCounts.sup = 0; roleCounts.dps = 0; roleCounts.tnk = 0; roleCounts.flx = 0;
    updateRoleDisplay(); updateCurrentComposition(); validateForm(); saveState();
  }
  // Удаление персонажа из списка по клику на чип
  function removeEnemy(name) {
    selectedEnemies.delete(name);
    starredEnemies.delete(name);
    afterListChange();
  }
  
  function removeMyHero(name) {
    selectedMyHeroes.delete(name);
    afterListChange();
  }
  
  function removeBan(name) {
    bannedHeroes.delete(name);
    afterListChange();
  }
  
  function removeStar(name) {
    starredEnemies.delete(name);
    afterListChange();
  }
  
  // Общая функция после изменения списка
  function afterListChange() {
    // Очищаем поиск
    if (DOM.search) {
      DOM.search.value = '';
      currentSearch = '';
    }
    renderGrid();
    updateCounters();
    updateCurrentComposition();
    validateForm();
    saveState();
  }
  
  // Очистка ВСЕХ списков
  function clearAll() {
    if (selectedEnemies.size === 0 && selectedMyHeroes.size === 0 && 
        bannedHeroes.size === 0 && starredEnemies.size === 0) return;
    selectedEnemies.clear();
    selectedMyHeroes.clear();
    bannedHeroes.clear();
    starredEnemies.clear();
    afterListChange();
  }
  
  // Сворачивание секции "Учитывать"
  function toggleOptionsSection() {
    if (!DOM.optionsSection || !DOM.optionsToggle) return;
    DOM.optionsSection.classList.toggle('collapsed');
    var isCollapsed = DOM.optionsSection.classList.contains('collapsed');
    DOM.optionsToggle.textContent = isCollapsed ? '▶' : '▼';
    try {
      localStorage.setItem('quickPickOptionsCollapsed', isCollapsed ? '1' : '0');
    } catch (e) {}
  }
  // Обновление количества отображаемых команд
  function updateMaxResults(value) {
    var val = parseInt(value);
    if (isNaN(val) || val < 1) val = 1;
    
    maxResultsCount = val;
    
    // Обновляем значение в input (если было некорректное)
    if (DOM.maxResultsInput && parseInt(DOM.maxResultsInput.value) !== val) {
      DOM.maxResultsInput.value = val;
    }
    
    // Сохраняем в localStorage
    try {
      localStorage.setItem('quickPickMaxResults', val.toString());
    } catch (e) {}
  }
  
  // ==========================================
  // UI
  // ==========================================
  function updateCounters() {
    if (DOM.enemyCount) DOM.enemyCount.textContent = selectedEnemies.size;
    if (DOM.myCount) DOM.myCount.textContent = selectedMyHeroes.size;
    if (DOM.banCount) DOM.banCount.textContent = bannedHeroes.size;
    if (DOM.starCount) DOM.starCount.textContent = starredEnemies.size;  // 🆕
  }
  function updateRoleDisplay() {
    if (DOM.roleSup) DOM.roleSup.textContent = roleCounts.sup;
    if (DOM.roleDps) DOM.roleDps.textContent = roleCounts.dps;
    if (DOM.roleTnk) DOM.roleTnk.textContent = roleCounts.tnk;
    if (DOM.roleFlx) DOM.roleFlx.textContent = roleCounts.flx;
    if (DOM.totalRoles) DOM.totalRoles.textContent = roleCounts.sup + roleCounts.dps + roleCounts.tnk + roleCounts.flx;
  }
    function updateCurrentComposition() {
    if (!DOM.compEl) return;
    
    var totalRoles = roleCounts.sup + roleCounts.dps + roleCounts.tnk + roleCounts.flx;
    var hasContent = selectedEnemies.size > 0 || selectedMyHeroes.size > 0 || 
                     bannedHeroes.size > 0 || totalRoles > 0;
    DOM.compEl.style.display = hasContent ? 'block' : 'none';
    if (!hasContent) return;
    
    var roleOrder = { sup: 0, dps: 1, tnk: 2 };
    function getRoleByName(name) {
      var hero = heroesData.find(function(h) { return h.name === name; });
      return hero ? hero.role : null;
    }
    function sortHeroesByRole(names) {
      return names.slice().sort(function(a, b) {
        var roleA = getRoleByName(a);
        var roleB = getRoleByName(b);
        var orderA = roleOrder[roleA] !== undefined ? roleOrder[roleA] : 3;
        var orderB = roleOrder[roleB] !== undefined ? roleOrder[roleB] : 3;
        if (orderA !== orderB) return orderA - orderB;
        return a.localeCompare(b);
      });
    }
    
    // Кликабельные чипы с крестиком
    function renderClickableHeroes(names, variant, removeFn) {
      if (names.length === 0) return '<span class="empty">не выбраны</span>';
      var sorted = sortHeroesByRole(names);
      return sorted.map(function(name) {
        var role = getRoleByName(name);
        var icon = getRoleIcon(role);
        var isStarred = starredEnemies.has(name);
        var chipClass = 'hero-chip clickable ' + variant + (isStarred ? ' starred' : '');
        var safeName = escapeHtml(name).replace(/'/g, "\\'");
        return '<span class="' + chipClass + '" onclick="' + removeFn + '(\'' + safeName + '\')" title="Клик — удалить из списка">' +
          (isStarred ? '<span class="chip-star-icon">⭐</span>' : '') +
          (icon ? '<span class="chip-role-icon">' + icon + '</span>' : '') +
          escapeHtml(name) +
          '<span class="chip-remove">✕</span>' +
          '</span>';
      }).join(' ');
    }
    
    if (DOM.currentMyHeroes) {
      DOM.currentMyHeroes.innerHTML = renderClickableHeroes(
        Array.from(selectedMyHeroes), 'my', 'removeMyHero'
      );
    }
    if (DOM.currentEnemies) {
      DOM.currentEnemies.innerHTML = renderClickableHeroes(
        Array.from(selectedEnemies), 'enemy', 'removeEnemy'
      );
    }
    // Блок банов
    if (DOM.currentBans) {
      if (bannedHeroes.size > 0) {
        var banList = sortHeroesByRole(Array.from(bannedHeroes));
        DOM.currentBans.innerHTML = banList.map(function(name) {
          var role = getRoleByName(name);
          var icon = getRoleIcon(role);
          var safeName = escapeHtml(name).replace(/'/g, "\\'");
          return '<span class="hero-chip clickable ban" onclick="removeBan(\'' + safeName + '\')" title="Клик — удалить из банов">' +
            (icon ? '<span class="chip-role-icon">' + icon + '</span>' : '') +
            escapeHtml(name) +
            '<span class="chip-remove">✕</span>' +
            '</span>';
        }).join(' ');
      } else {
        DOM.currentBans.innerHTML = '<span class="empty">нет банов</span>';
      }
    }
    if (DOM.currentStars) {
      if (starredEnemies.size > 0) {
        var starList = sortHeroesByRole(Array.from(starredEnemies));
        DOM.currentStars.innerHTML = starList.map(function(name) {
          var role = getRoleByName(name);
          var icon = getRoleIcon(role);
          var safeName = escapeHtml(name).replace(/'/g, "\\'");
          return '<span class="hero-chip clickable enemy starred" onclick="removeStar(\'' + safeName + '\')" title="Клик — снять звезду">' +
            '<span class="chip-star-icon">⭐</span>' +
            (icon ? '<span class="chip-role-icon">' + icon + '</span>' : '') +
            escapeHtml(name) +
            '<span class="chip-remove">✕</span>' +
            '</span>';
        }).join(' ');
      } else {
        DOM.currentStars.innerHTML = '<span class="empty">не выбраны</span>';
      }
    }
    if (DOM.currentRoles) {
      var parts = [];
      if (roleCounts.sup > 0) parts.push('✚ Sup × ' + roleCounts.sup);
      if (roleCounts.dps > 0) parts.push('⚔️ DPS × ' + roleCounts.dps);
      if (roleCounts.tnk > 0) parts.push('🛡️ Tnk × ' + roleCounts.tnk);
      if (roleCounts.flx > 0) parts.push('🎲 FLX × ' + roleCounts.flx);
      DOM.currentRoles.innerHTML = parts.length > 0 ? parts.join(', ') : '<span class="empty">не выбраны</span>';
    }
  }
  function validateForm() {
    if (!DOM.generateBtn) return;
    var total = roleCounts.sup + roleCounts.dps + roleCounts.tnk + roleCounts.flx;
    DOM.generateBtn.disabled = !(total > 0);
  }
  
  // ==========================================
  // СОХРАНЕНИЕ
  // ==========================================
  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        enemies: Array.from(selectedEnemies),
        myHeroes: Array.from(selectedMyHeroes),
        bans: Array.from(bannedHeroes),
        stars: Array.from(starredEnemies),  // 🆕
        roles: roleCounts,
        options: {
          useSynergies: document.getElementById('useSynergies').checked,
          useSoloSynergies: document.getElementById('useSoloSynergies').checked,
          useTiers: document.getElementById('useTiers').checked,
          useCounterPicks: document.getElementById('useCounterPicks').checked,
          useClassWeights: document.getElementById('useClassWeights').checked,
          useAntiRoleWeights: document.getElementById('useAntiRoleWeights').checked
        }
      }));
    } catch (e) {}
  }
  function loadState() {
    try { var s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : null; } catch (e) { return null; }
  }
  function restoreState(state) {
    if (!state) return;
    if (state.enemies) state.enemies.forEach(function(h) { if (heroesData.some(function(x){return x.name===h;}) && selectedEnemies.size < MAX_ENEMIES) selectedEnemies.add(h); });
    if (state.stars) state.stars.forEach(function(h) {
      if (heroesData.some(function(x){return x.name===h;}) && selectedEnemies.has(h) && starredEnemies.size < MAX_STARS) {
        starredEnemies.add(h);
      }
    });
    if (state.myHeroes) state.myHeroes.forEach(function(h) { if (heroesData.some(function(x){return x.name===h;}) && selectedMyHeroes.size < MAX_MY) selectedMyHeroes.add(h); });
    if (state.bans) state.bans.forEach(function(h) { if (heroesData.some(function(x){return x.name===h;})) bannedHeroes.add(h); });
    if (state.roles) {
      roleCounts.sup = Math.min(state.roles.sup || 0, MAX_PER_ROLE);
      roleCounts.dps = Math.min(state.roles.dps || 0, MAX_PER_ROLE);
      roleCounts.tnk = Math.min(state.roles.tnk || 0, MAX_PER_ROLE);
      roleCounts.flx = Math.min(state.roles.flx || 0, MAX_FLX);
    }
    if (state.options) {
      ['useSynergies','useSoloSynergies','useTiers','useCounterPicks','useClassWeights','useAntiRoleWeights'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.checked = !!state.options[id];
      });
    }
    updateRoleDisplay(); updateCounters(); updateCurrentComposition(); validateForm(); renderGrid();
  }
  
  // ==========================================
  // ГЕНЕРАЦИЯ
  // ==========================================
  function generateTeams() {
    var roles = [];
    for (var i = 0; i < roleCounts.sup; i++) roles.push('sup');
    for (var i = 0; i < roleCounts.dps; i++) roles.push('dps');
    for (var i = 0; i < roleCounts.tnk; i++) roles.push('tnk');
    for (var i = 0; i < roleCounts.flx; i++) roles.push('flx');
    
    var options = {
      useSynergies: document.getElementById('useSynergies').checked,
      useSoloSynergies: document.getElementById('useSoloSynergies').checked,
      useTiers: document.getElementById('useTiers').checked,
      useCounterPicks: document.getElementById('useCounterPicks').checked,
      useClassWeights: document.getElementById('useClassWeights').checked,
      useAntiRoleWeights: document.getElementById('useAntiRoleWeights').checked,
      maxResults: maxResultsCount
    };
    
    currentOptions = options;
    
    if (DOM.spinner) DOM.spinner.style.display = 'block';
    if (DOM.results) DOM.results.style.display = 'none';
    if (DOM.generateBtn) DOM.generateBtn.disabled = true;
    
    google.script.run
      .withSuccessHandler(showResults)
      .withFailureHandler(showError)
      .quickPickTeams(
        Array.from(selectedEnemies), 
        Array.from(selectedMyHeroes), 
        roles, 
        options, 
        Array.from(bannedHeroes),
        Array.from(starredEnemies)
      );
  }
  
  // ==========================================
  // РЕЗУЛЬТАТЫ
  // ==========================================
  function showResults(result) {
    try {
      lastResult = result;
      if (DOM.spinner) DOM.spinner.style.display = 'none';
      if (DOM.generateBtn) DOM.generateBtn.disabled = false;
      if (!DOM.resultsList) return;
      DOM.resultsList.innerHTML = '';
      
      if (!result) {
        DOM.results.style.display = 'block';
        DOM.resultsList.innerHTML = '<div style="color:#d32f2f;padding:10px;">Пустой результат от сервера</div>';
        return;
      }
      
      if (!result.success) {
        DOM.results.style.display = 'block';
        DOM.resultsList.innerHTML = '<div style="color:#d32f2f;padding:10px;">' + (result.error || 'Не найдено') + '</div>';
        return;
      }
      
      var groups = result.groups || [];
      
      if (groups.length === 0) {
        DOM.results.style.display = 'block';
        DOM.resultsList.innerHTML = '<div style="color:#d32f2f;padding:10px;">Команд не найдено</div>';
        return;
      }
      
      // Итоговая раскладка "моих" героев (один раз на все группы)
      var currentComp = getCurrentComposition(result.myHeroes || []);
      
      var html = '';
      html += '<div class="section-title" style="margin-bottom:6px;">✅ Лучшие предложения</div>';
      html += '<div style="font-size:11px;color:#888;margin-bottom:6px;">💡 Кликните на группу. Пунктирные герои имеют замены.</div>';
      
      if (result.stats) {
        var totalGroups = (result.groups || []).length;
        var displayedGroups = groups.length;
        var groupsText = displayedGroups === totalGroups 
          ? '📦 <b class="summary-badge">' + displayedGroups + ' групп</b>'
          : '📦 <b class="summary-badge">' + displayedGroups + ' из ' + totalGroups + ' групп</b>';
        
        html += '<div class="results-summary">' +
          '<span>⏱️ <b class="summary-badge">' + result.stats.duration + 'с</b></span>' +
          '<span>🔍 <b class="summary-badge">' + (result.stats.iterations || 0).toLocaleString() + '</b></span>' +
          '<span>' + groupsText + '</span></div>';
      }
      
      groups.forEach(function(group, idx) {
        var isMulti = group.slotAlternatives && group.slotAlternatives.length > 0;
        var cls = 'team-group' + (isMulti ? ' multi' : '');
        
        // Базовые герои
        var baseHtml = '';
        if (group.baseMembers) {
          baseHtml = group.baseMembers.map(function(name, pos) {
            var esc = escapeHtml(name);
            var slot = isMulti ? group.slotAlternatives.find(function(s){return s.position===pos;}) : null;
            var hasAlt = slot && slot.alternatives.length > 0;
            var heroData = heroesData.find(function(h) { return h.name === name; });
            var heroRole = heroData ? heroData.role : null;
            var heroIconChar = getRoleIcon(heroRole);
            
            // Показываем вес базового героя В РАМКАХ КОМПОЗИЦИИ (= оценка лучшей команды)
            var weightText = '';
            if (hasAlt && slot.baseHeroWeight !== undefined) {
              weightText = '<span class="hero-weight" title="Оценка команды с этим героем">[' + slot.baseHeroWeight.toFixed(1) + ']</span>';
            }
            
            return '<span class="base-hero' + (hasAlt ? ' has-alt' : '') + '"' + 
              (hasAlt ? ' title="' + slot.alternatives.length + ' замен той же роли"' : '') + '>' +
              (heroIconChar ? '<span class="hero-role-chip">' + heroIconChar + '</span>' : '') +
              esc + weightText +
              '</span>';
          }).join(' ');
        }
        
        // Слоты альтернатив
        var slotsHtml = '';
        if (isMulti && group.slotAlternatives) {
          slotsHtml = '<div class="slot-alternatives">' + group.slotAlternatives.map(function(slot, slotIdx) {
            if (!slot.alternatives || slot.alternatives.length === 0) return '';
            var icon = getRoleIcon(slot.baseRole);
            
            // Первый пункт — базовый герой
            var baseWeightText = slot.baseHeroWeight !== undefined 
              ? ' [' + slot.baseHeroWeight.toFixed(1) + ']' 
              : '';
            
            var opts = '<option value="base" selected>' + 
              escapeHtml((icon ? icon + ' ' : '') + slot.baseHero + baseWeightText) + 
              '</option>';
            
            // Альтернативы отсортированы по весу в рамках композиции
            opts += slot.alternatives.map(function(alt, altIdx) {
              var aIcon = getRoleIcon(alt.role);
              // Показываем вес в рамках композиции (оценку команды с этой альтернативой)
              var weightText = alt.compositionWeight !== undefined 
                ? ' [' + alt.compositionWeight.toFixed(1) + ']' 
                : '';
              return '<option value="' + slotIdx + '-' + altIdx + '">' + 
                escapeHtml((aIcon ? aIcon + ' ' : '') + alt.name + weightText) + 
                '</option>';
            }).join('');
            
            return '<div class="slot-item">' +
              '<span class="slot-label">' + (icon ? icon + ' ' : '') + escapeHtml(slot.baseHero) + ' →</span>' +
              '<select class="slot-select" data-slot-idx="' + slotIdx + '" data-group-idx="' + idx + '" onchange="selectSlotAlternative(this)" onclick="event.stopPropagation()">' +
              opts + '</select></div>';
          }).join('') + '</div>';
        }
        
        var scoreRange = group.bestScore === group.worstScore 
          ? group.bestScore.toFixed(1) 
          : group.worstScore.toFixed(1) + ' — ' + group.bestScore.toFixed(1);
        
        var variantsCount = group.slotAlternatives 
          ? group.slotAlternatives.reduce(function(s, x){return s + x.alternatives.length;}, 0) 
          : 0;
        
        // Итоговая раскладка всей команды (уже вычислена на сервере)
        var finalComp = group.baseComposition || '';
        var addedCount = group.baseMembers ? group.baseMembers.length : 0;
        
        var compDisplay;
        var compTooltip;
        if (addedCount <= 3) {
          // Мало замен — показываем "изначальная → итоговая"
          compDisplay = currentComp + ' → ' + finalComp;
          compTooltip = 'Изначальная (мои): ' + currentComp + ' → Итоговая (вся команда): ' + finalComp;
        } else {
          // Много замен — только итоговая
          compDisplay = finalComp;
          compTooltip = 'Итоговая раскладка команды: ' + finalComp;
        }
        
        // Оценка лучшей команды группы
        var teamWeightHtml = '';
        if (group.bestTeamWeight !== undefined) {
          teamWeightHtml = '<span class="meta-badge weight" title="Оценка лучшей команды в группе">💪 ' + group.bestTeamWeight.toFixed(1) + '</span>';
        }
        
        var meta = '<div class="group-meta">' +
          '<span>⭐ <b>' + scoreRange + '</b></span>' +
          '<span class="meta-badge composition" title="' + escapeHtml(compTooltip) + '">' +
            '📐 ' + escapeHtml(compDisplay) + ' (×' + (group.compositionWeight || 1) + ')' +
          '</span>' +
          teamWeightHtml +
          (variantsCount > 0 ? '<span class="meta-badge variants">🔄 ' + variantsCount + '</span>' : '') +
          '</div>';
        
        var details = group.bestTeam && group.bestTeam.formattedDetails ? group.bestTeam.formattedDetails : '';
        
        html += '<div class="' + cls + '" onclick="toggleGroup(event,this)">' +
          '<div class="group-header">' +
            '<span class="group-rank">#' + (idx + 1) + '</span>' +
            '<div class="group-main"><div class="group-base">' + baseHtml + '</div>' + slotsHtml + meta + '</div>' +
            '<span class="expand-icon">▶</span>' +
          '</div>' +
          '<div class="group-details">' + details + '</div></div>';
      });
      
      DOM.resultsList.innerHTML = html;
      DOM.results.style.display = 'block';
      
    } catch (e) {
      console.error('❌ Ошибка в showResults:', e);
      if (DOM.spinner) DOM.spinner.style.display = 'none';
      if (DOM.generateBtn) DOM.generateBtn.disabled = false;
      if (DOM.resultsList) {
        DOM.resultsList.innerHTML = '<div style="color:#d32f2f;padding:10px;">Ошибка отображения: ' + (e.message || e) + '</div>';
        if (DOM.results) DOM.results.style.display = 'block';
      }
    }
  }
  
  function toggleGroup(event, el) {
    if (event.target.tagName === 'SELECT' || event.target.tagName === 'OPTION') return;
    if (event.target.closest && (event.target.closest('.detail-block-header') || event.target.closest('.slot-item'))) return;
    el.classList.toggle('expanded');
  }
  
  // ==========================================
  // ВЫБОР АЛЬТЕРНАТИВЫ С ПЕРЕСЧЁТОМ ОЦЕНКИ
  // ==========================================
  function selectSlotAlternative(selectEl) {
    if (!lastResult || !lastResult.groups) return;
    
    var groupIdx = parseInt(selectEl.getAttribute('data-group-idx'));
    var slotIdx = parseInt(selectEl.getAttribute('data-slot-idx'));
    var group = lastResult.groups[groupIdx];
    if (!group) return;
    
    var groupEl = selectEl.closest('.team-group');
    
    // Собираем текущую комбинацию героев: база + выбранные альтернативы
    var currentMembers = group.baseMembers.slice(); // копия базы
    var allSelects = groupEl.querySelectorAll('.slot-select');
    
    for (var i = 0; i < allSelects.length; i++) {
      var sel = allSelects[i];
      var sIdx = parseInt(sel.getAttribute('data-slot-idx'));
      var slot = group.slotAlternatives[sIdx];
      if (!slot) continue;
      
      if (sel.value !== 'base' && sel.value !== '') {
        var parts = sel.value.split('-');
        var altIdx = parseInt(parts[1]);
        var alt = slot.alternatives[altIdx];
        if (alt) {
          // Заменяем базу на альтернативу
          var basePos = currentMembers.indexOf(slot.baseHero);
          if (basePos !== -1) {
            currentMembers[basePos] = alt.name;
          }
        }
      }
    }
    
    // Показываем индикатор пересчёта
    showGroupLoading(groupEl);
    
    // Счётчик для отмены устаревших запросов
    evaluationCounter++;
    var myCounter = evaluationCounter;
    
    // Запрашиваем серверный пересчёт
    google.script.run
      .withSuccessHandler(function(result) {
        // Если пришёл устаревший ответ — игнорируем
        if (myCounter !== evaluationCounter) return;
        
        hideGroupLoading(groupEl);
        
        if (result && result.success) {
          // Обновляем детали
          var detailsEl = groupEl.querySelector('.group-details');
          if (detailsEl) detailsEl.innerHTML = result.formattedDetails;
          
          // Обновляем оценку
          var metaEl = groupEl.querySelector('.group-meta');
          if (metaEl) {
            var sp = metaEl.querySelector('span:first-child');
            if (sp) sp.innerHTML = '⭐ <b>' + result.totalScore.toFixed(1) + '</b>';
          }
          
          // Раскрываем группу, чтобы показать обновлённые детали
          groupEl.classList.add('expanded');
        } else {
          // Ошибка оценки
          var detailsEl = groupEl.querySelector('.group-details');
          if (detailsEl) {
            detailsEl.innerHTML = '<div style="color:#d32f2f;padding:8px;font-size:12px;">⚠️ ' + 
              (result && result.error ? result.error : 'Не удалось оценить комбинацию') + 
              '</div>';
          }
          groupEl.classList.add('expanded');
        }
      })
      .withFailureHandler(function(err) {
        if (myCounter !== evaluationCounter) return;
        hideGroupLoading(groupEl);
        console.error('Ошибка пересчёта:', err);
      })
      .evaluateSpecificTeam(
        currentMembers,
        lastResult.myHeroes || [],
        lastResult.enemies || [],
        currentOptions || getCurrentOptions(),
        [],  // баны уже учтены
        []   // звёзды уже учтены (передаём через последний аргумент, если нужно)
      );
  }

  // Показ индикатора пересчёта
  function showGroupLoading(groupEl) {
    var metaEl = groupEl.querySelector('.group-meta');
    if (metaEl && !metaEl.querySelector('.evaluation-loading')) {
      var loader = document.createElement('span');
      loader.className = 'evaluation-loading';
      loader.innerHTML = ' <span class="loading-spinner"></span>Пересчёт...';
      metaEl.appendChild(loader);
    }
  }
  
  // Скрытие индикатора
  function hideGroupLoading(groupEl) {
    var loader = groupEl.querySelector('.evaluation-loading');
    if (loader) loader.remove();
  }
  
  function showError(err) {
    DOM.spinner.style.display = 'none';
    DOM.generateBtn.disabled = false;
    alert('❌ ' + (err.message || 'Ошибка'));
  }
  
  function showAuthError() {
    document.body.innerHTML = 
      '<div style="padding:20px;text-align:center;">' +
        '<div style="font-size:48px;">🔐</div>' +
        '<h3 style="color:#d32f2f;">Требуется авторизация</h3>' +
        '<button onclick="requestAuthorization()" style="padding:12px 24px;background:#1976d2;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:bold;">🔐 Авторизовать</button>' +
      '</div>';
  }
  
  function requestAuthorization() {
    google.script.run
      .withSuccessHandler(function() { location.reload(); })
      .withFailureHandler(function(err) { alert('❌ ' + err.message); })
      .authorizeScript();
  }
</script>
